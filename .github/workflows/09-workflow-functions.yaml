on:
  pull_request:
  workflow_dispatch:

jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: exit 1
      - name: I will be skipped
        if: ${{ success() }}
        run: echo "I will print if the previous step succeeded"
      - name: I will execute
        if: ${{ failure() }}
        run: echo "I will print if the previous step failed"
      - name: I will also execute
        if: ${{ !Cancelled() }}
        run: echo "I will always print,except when the workflow is cancelled"
      - name: I will execute when cancelled
        if: ${{ Cancelled() }}
        run: echo "I will print if the workflow is cancelled"


